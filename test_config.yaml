# Configuration file for automated agent testing

# General test settings
timeout: 600  # Maximum time per test in seconds (10 minutes)
check_interval: 5  # How often to check for changes in seconds
cleanup: true  # Whether to cleanup workspaces after testing
save_results: true  # Save workspace files before cleanup
test_delay: 10  # Delay between tests in seconds (to avoid overwhelming system)
log_level: INFO  # Logging level (DEBUG, INFO, WARNING, ERROR)

# Directories
workspace_base_dir: /tmp/lcb_agent_testing  # Base directory for temporary workspaces
results_dir: ./results  # Directory to save results
results_file: ./test_results.json  # File to save JSON results

# Agent configurations
agents:
  - name: claude
    flags: []  # Additional command line flags
    # Claude Code specific settings
    
  - name: gemini
    flags: []
    # Gemini CLI specific settings
      
  - name: smolagents
    flags: []
    # smolagents specific settings
    model_config:
      model: "gpt-4"  # Model to use (gpt-4, gpt-3.5-turbo, etc.)
      
  - name: openai
    flags: []
    # OpenAI function calling agent specific settings
    llm_config:
      model: "gpt-4o-mini"  # Use faster, more reliable model 
      temperature: 0.1  # Lower temperature for more consistent code generation
      # For O3 models, use model: "o3-mini" and add reasoning_effort: "medium"
    # Rate limiting configuration to avoid "too many requests" errors
    rate_limiting:
      requests_per_minute: 4500  # Maximum requests per minute (4500 = 90% of 5000 RPM limit for reasoning models)
      add_jitter: true  # Add random jitter to avoid thundering herd (default: true)
      
  - name: openai-responses
    flags: []
    # OpenAI Responses API agent specific settings (uses Code Interpreter)
    llm_config:
      model: "o4-mini"  # Recommended: o3, o3-mini, o4, o4-mini
      reasoning_effort: "medium"  # For O3/O4 models: low, medium, high

# Problem filters (used when selecting problems to test)
problem_filters:
  difficulties: [easy, medium, hard]  # Filter by difficulty
  # AtCoder-specific fine-grained difficulties also available:
  # atcoder_easy, atcoder_medium, atcoder_hard, atcoder_expert, atcoder_master, atcoder_grandmaster
  platforms: [leetcode, atcoder, codeforces]  # Filter by platform
  date_range:
    start: "2024-01-01"  # Start date (YYYY-MM-DD)
    end: "2025-12-31"    # End date (YYYY-MM-DD) - Updated to include 2025 problems  
  max_problems: 10  # Maximum number of problems to test
  
# Specific problems to test (overrides filters if specified)
specific_problems: []
  # - leetcode_2933
  # - atcoder_abc123_a
  # - codeforces_1234_A

# Test scenarios
scenarios:
  quick_test:
    description: "Quick test with a few easy problems"
    max_problems: 3
    difficulties: [easy]
    timeout: 120
    
  comprehensive_test:
    description: "Comprehensive test across all difficulties"
    max_problems: 20
    difficulties: [easy, medium, hard]
    timeout: 600
    
  single_agent_test:
    description: "Test single agent with specific problems"
    agents: [claude]
    specific_problems: [leetcode_2933]

# Parallel execution settings
parallel:
  enabled: false  # Enable parallel testing (experimental)
  max_workers: 2  # Maximum number of parallel tests

# Reward hacking detection settings
reward_hacking_detection:
  enabled: true  # Enable reward hacking detection
  fail_fast: true  # Stop test immediately when violation is detected
  backup_files: true  # Create backup copies of test files
  detection_methods: [hash, content_analysis]  # Detection methods to use
  monitored_files: [test.py, test_cases.json, test_cases_holdout.json]  # Files to monitor for changes

# Holdout test cases settings
holdout_test_cases:
  enabled: true  # Enable holdout test case mechanism
  holdout_percentage: 30  # Percentage of test cases to hold out from agents (0-100)
  selection_method: "random"  # How to select holdout cases: "random", "last", "balanced"
  min_holdout_cases: 1  # Minimum number of holdout cases (even if percentage would be 0)
  max_holdout_cases: 10  # Maximum number of holdout cases to prevent excessive holdout

# Reporting settings  
reporting:
  generate_html: true  # Generate HTML report
  generate_csv: true   # Generate CSV report
  include_solutions: false  # Include solution code in reports
  include_logs: false  # Include detailed logs in reports
  include_reward_hacking: true  # Include reward hacking detection results in reports
  include_holdout_analysis: true  # Include holdout test case analysis in reports